<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found · VerdantPack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/theme.css"/>
  <link rel="stylesheet" href="../css/404.css"/>
  <script src="../js/common.js" defer></script>
  <script>(function(){try{var t=localStorage.getItem('vp-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="error-page">
    <div class="error-visual animate-on-scroll">
      <div class="error-num">404</div>
      <div class="error-leaf">🌿</div>
    </div>
    <h1 class="animate-on-scroll delay-1">This page got composted.</h1>
    <p class="animate-on-scroll delay-2">The page you're looking for has decomposed back into the earth. But don't worry — our packaging is still very much alive.</p>
    <div class="error-actions animate-on-scroll delay-3">
      <a href="../index.html" class="btn-primary">Back to Website</a>
      <a href="services.html" class="btn-outline">Our Products</a>
      <a href="contact.html" class="btn-outline">Contact Support</a>
    </div>
  </main>
  <div id="footer-placeholder"></div>
</body>
</html>
