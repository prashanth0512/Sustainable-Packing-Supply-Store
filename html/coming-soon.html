<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon — VerdantPack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/theme.css"/>
  <link rel="stylesheet" href="../css/coming-soon.css"/>
  <script src="../js/common.js" defer></script>
  <script src="../js/coming-soon.js" defer></script>
  
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
</head>
<body>
  <div class="auth-theme-toggle">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/></svg>
    </button>
  </div>
  <div id="header-placeholder"></div>
  <main class="coming-page">
    <div class="coming-emoji animate-on-scroll"><i data-lucide="sprout" class="icon-sm"></i></div>
    <div class="coming-tag animate-on-scroll delay-1"><i data-lucide="wrench" class="icon-sm"></i> Under Construction</div>
    <h1 class="animate-on-scroll delay-1">Something Sustainable<br/>Is Growing Here</h1>
    <p class="animate-on-scroll delay-2">We're building something great. Be the first to know when it launches.</p>
    <div class="countdown animate-on-scroll delay-2" id="countdown">
      <div class="count-unit"><strong id="cDays">00</strong><span>Days</span></div>
      <div class="count-unit"><strong id="cHours">00</strong><span>Hours</span></div>
      <div class="count-unit"><strong id="cMins">00</strong><span>Mins</span></div>
      <div class="count-unit"><strong id="cSecs">00</strong><span>Secs</span></div>
    </div>
    <form class="coming-form animate-on-scroll delay-3" onsubmit="handleNotify(event)">
      <input type="email" placeholder="Enter your email to get notified" class="form-input" required/>
      <button type="submit" class="btn-primary">Notify Me</button>
    </form>
    <div class="coming-success inline-style-cb4589" id="comingSuccess" >
      <span><i data-lucide="check-circle" class="icon-sm"></i></span> You're on the list! We'll email you when we launch.
    </div>
    <a href="../index.html" class="back-link animate-on-scroll delay-4">← Back to VerdantPack</a>
  </main>
  <div id="footer-placeholder"></div>
  </body>
</html>
